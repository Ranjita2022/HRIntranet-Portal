<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEEE Admin Login - HR Portal</title>
    <link href="vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.css">
    <link href="vendor/fonts/fonts/fonts.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #003C71 0%, #00629B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', 'Arial', sans-serif;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 1rem;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .login-icon {
            width: 80px;
            height: 80px;
            background: #00629B;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: white;
        }
        
        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            color: #6c757d;
            font-size: 0.95rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            padding: 0.875rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #00629B;
            box-shadow: 0 0 0 3px rgba(0, 98, 155, 0.15);
        }
        
        .input-group-text {
            background: transparent;
            border: 2px solid #e0e0e0;
            border-right: none;
            border-radius: 10px 0 0 10px;
        }
        
        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }
        
        .input-group:focus-within .input-group-text {
            border-color: #00629B;
        }
        
        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: #00629B;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .btn-login:hover {
            background: #0084CA;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 98, 155, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }
        
        .alert {
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: #00629B;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .back-link a:hover {
            color: #0084CA;
        }
        
        .credential-info {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }
        
        .credential-info strong {
            color: #0d6efd;
        }
        
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="images/ieee.png" alt="IEEE Logo" style="width: 120px; margin-bottom: 1rem; filter: invert(1);">
                <div class="login-icon">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h1 class="login-title">IEEE Admin Login</h1>
                <p class="login-subtitle">HR Portal Management System</p>
            </div>
            
            <div id="errorMessage"></div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person-fill text-primary"></i> Username
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username"
                            placeholder="Enter your username"
                            required 
                            autofocus
                        >
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock-fill text-primary"></i> Password
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password"
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                </div>
                
                <button type="submit" class="btn btn-login" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>
            
            <div class="back-link">
                <a href="index.html">
                    <i class="bi bi-arrow-left"></i> Back to Portal
                </a>
            </div>
            
            <div class="credential-info">
                <i class="bi bi-info-circle text-primary"></i>
                <strong>Default Credentials:</strong><br>
                Username: <code>admin</code><br>
                Password: <code>admin123</code>
            </div>
        </div>
    </div>
    
    <script src="vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/admin-utils.js"></script>
    <script>
        // Initialize AdminAPI
        AdminAPI.init();
        
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        
        // Check if already logged in
        if (AdminAPI.isAuthenticated()) {
            console.log('✅ User already authenticated, redirecting to admin panel...');
            sessionStorage.setItem('just_logged_in', 'true');
            window.location.href = 'admin-panel.html';
        } else {
            console.log('ℹ️ User not authenticated, showing login form');
            // Clear any stale session data
            sessionStorage.removeItem('just_logged_in');
        }
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }
            
            // Disable form during login
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
            errorMessage.innerHTML = '';
            
            try {
                console.log('🔐 Attempting login for user:', username);
                
                const result = await AdminAPI.login(username, password);
                
                console.log('✅ Login successful:', result);
                
                // Re-initialize AdminAPI to load the new token
                AdminAPI.init();
                
                // Verify authentication
                if (!AdminAPI.isAuthenticated()) {
                    throw new Error('Token not saved properly');
                }
                
                console.log('✅ Token verified, user authenticated');
                
                // Show success message
                errorMessage.innerHTML = `
                    <div class="alert alert-success">
                        <i class="bi bi-check-circle"></i>
                        Login successful! Redirecting...
                    </div>
                `;
                
                // Set flag to track we just logged in (prevent redirect loops)
                sessionStorage.setItem('just_logged_in', 'true');
                
                // Redirect to admin panel
                setTimeout(() => {
                    window.location.href = 'admin-panel.html';
                }, 1000);
                
            } catch (error) {
                console.error('❌ Login failed:', error);
                
                showError(error.message || 'Invalid username or password. Please try again.');
                
                // Re-enable form
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
                passwordInput.value = '';
                passwordInput.focus();
            }
        });
        
        function showError(message) {
            errorMessage.innerHTML = `
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle"></i>
                    ${message}
                </div>
            `;
        }
        
        // Enter key support
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>

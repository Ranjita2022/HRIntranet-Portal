# ============================================
# HR Intranet Portal - Application Configuration
# ============================================

# Server Configuration
server.port=8080
# server.servlet.context-path=/api
server.tomcat.use-native-library=false

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hr_intranet_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=test
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.company.hrintranet=DEBUG
logging.level.org.springframework.web=DEBUG

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom Application Properties
app.upload.dir=uploads/images
app.upload.allowed-types=image/jpeg,image/jpg,image/png,image/gif,image/webp
app.upload.max-dimension=4000

# JWT Configuration
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationChangeThisInProduction123456789
app.jwt.expiration-ms=86400000

# CORS Configuration
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*,file://*
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Logging
logging.level.root=INFO
logging.level.com.company.hrintranet=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Date Format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
